# 应用服务 WEB 访问端口
server.port=9999

#####设置数据库文件########
spring.mvc.async.request-timeout=60000
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/petservices?useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=nofear

#指定Mybatis的实体目录
mybatis.type-aliases-package=com.petservices.entity
#是否驼峰转下划线
mybatis-plus.configuration.map-underscore-to-camel-case=false
#设置 mybatis sql语句输出
logging.level.com.petservices.mapper=debug

#防止中文乱码
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8

spring.servlet.multipart.max-file-size=30MB


